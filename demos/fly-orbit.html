<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyKit: Fly / Orbit automation</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <aside>
      <nav class="breadcrumb"><a href="../index.html">SkyKit</a> <span>/ Fly &amp; Orbit</span></nav>
      <h1>Fly &amp; Orbit</h1>
      <p>
        Exercise <code>createCameraRigController</code> automation: programmatic
        <code>flyTo</code> and <code>orbit</code>. Manual WASD / pointer still
        work when no automation is active.
      </p>
      <label for="mag-limit">Magnitude Limit</label>
      <input id="mag-limit" type="number" min="0" max="25" step="0.5" value="6.5" data-mag-limit />
      <div class="controls">
        <button type="button" data-action="create">Create Viewer</button>
        <button type="button" data-action="dispose">Dispose Viewer</button>
        <button type="button" data-action="refresh">Refresh Selection</button>
        <button type="button" data-action="warm">Warm Dataset</button>
      </div>
      <p class="aside-section-title">Fly to</p>
      <div class="controls">
        <button type="button" data-action="fly-sun">Sun</button>
        <button type="button" data-action="fly-alcyone">Alcyone (Pleiades)</button>
        <button type="button" data-action="fly-orion-nebula">Orion Nebula</button>
      </div>
      <p class="aside-section-title">Look at</p>
      <div class="controls">
        <button type="button" data-action="look-sun">Sun</button>
        <button type="button" data-action="look-alcyone">Alcyone</button>
        <button type="button" data-action="look-orion-nebula">Orion Nebula</button>
      </div>
      <label for="look-constellation">Look at constellation</label>
      <select id="look-constellation" data-look-constellation>
        <option value="">Loading constellations...</option>
      </select>
      <label for="show-constellation-art">
        <input id="show-constellation-art" type="checkbox" data-show-constellation-art />
        Show constellation art
      </label>
      <p class="aside-section-title">Orbit</p>
      <div class="controls">
        <button type="button" data-action="orbit-sun">Sun</button>
        <button type="button" data-action="orbit-pleiades">Pleiades</button>
        <button type="button" data-action="orbit-orion-nebula">Orion Nebula</button>
        <button type="button" data-action="cancel-auto">Cancel automation</button>
      </div>
      <p class="status">Status: <span data-status>idle</span></p>
      <pre class="meta-block" data-summary></pre>
      <pre data-snapshot></pre>
    </aside>
    <main>
      <div class="viewer-shell" data-skykit-viewer-root></div>
    </main>
    <script type="module" src="/src/demo/fly-orbit.js"></script>
  </body>
</html>
