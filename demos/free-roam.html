<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyKit: Free Roam Demo</title>
    <link rel="stylesheet" href="./shared.css" />
  </head>
  <body>
    <aside>
      <nav class="breadcrumb"><a href="../index.html">SkyKit</a> <span>/ Free Roam</span></nav>
      <h1>Free Roam</h1>
      <p>
        One viewer, one shell field, and automatic reselection as the observer moves.
      </p>
      <ul>
        <li>Drag in the viewer to look around.</li>
        <li>Use <code>WASD</code> to move, <code>Q/E</code> to roll, <code>Shift/Space</code> for vertical.</li>
        <li>Selection refresh follows meaningful observer movement.</li>
      </ul>
      <label for="mag-limit">Magnitude Limit</label>
      <input id="mag-limit" type="number" min="0" max="25" step="0.5" value="6.5" data-mag-limit />
      <p class="status">Status: <span data-status>idle</span></p>
      <pre class="meta-block" data-summary></pre>
      <pre data-snapshot></pre>
    </aside>
    <main>
      <div class="viewer-shell" data-skykit-viewer-root></div>
    </main>
    <script type="module" src="/src/demo/free-fly.js"></script>
  </body>
</html>
